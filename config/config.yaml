project:
  name: "fraud_detection"
  version: "1.0.0"
  random_state: 42

data:
  raw_path: "data/raw/creditcard.csv"
  processed_path: "data/processed/"
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

features:
  numerical: ["Amount", "Time"]
  pca_features: ["V1", "V2", "V3", "V4", "V5", "V6", "V7", "V8", "V9", "V10",
                 "V11", "V12", "V13", "V14", "V15", "V16", "V17", "V18", "V19", "V20",
                 "V21", "V22", "V23", "V24", "V25", "V26", "V27", "V28"]
  target: "Class"
  engineered:
    - "hour_of_day"
    - "amount_log"
    - "amount_scaled"

model:
  name: "lightgbm"
  params:
    objective: "binary"
    metric: "auc"
    num_leaves: 31
    learning_rate: 0.05
    feature_fraction: 0.9
    bagging_fraction: 0.8
    bagging_freq: 5
    max_depth: -1
    min_child_samples: 20
    scale_pos_weight: 50
    verbose: -1
    random_state: 42

training:
  n_estimators: 1000
  early_stopping_rounds: 50
  use_smote: true
  smote_ratio: 0.3
  cv_folds: 5

mlflow:
  experiment_name: "fraud_detection"
  tracking_uri: "mlruns"
  model_name: "fraud_detector_lightgbm"

api:
  host: "0.0.0.0"
  port: 8000
  model_path: "models/production_model.pkl"
  scaler_path: "models/scaler.pkl"
  threshold: 0.01
  max_workers: 4

monitoring:
  log_predictions: true
  prediction_log_path: "logs/predictions.csv"
  
streamlit:
  title: "Fraud Detection System"
  page_icon: "🔍"
  layout: "wide"